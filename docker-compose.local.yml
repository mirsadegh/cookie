services:
  django:
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: cookie_local_django
    container_name: cookie_local_django
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    ports:
      - '8000:8000'
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: cookie_production_postgres
    container_name: cookie_local_postgres
    volumes:
      - cookie_local_postgres_data:/var/lib/postgresql/data
      - cookie_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  node:
    build:
      context: .
      dockerfile: ./compose/local/node/Dockerfile
    image: cookie_local_node
    container_name: cookie_local_node
    depends_on:
      - django
    volumes:
      - .:/app:z
      - /app/node_modules
    command: npm run dev
    ports:
      - '3000:3000'

volumes:
  cookie_local_postgres_data: {}
  cookie_local_postgres_data_backups: {}
